<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 모둠 뽑기</title>
  <style>
    /* 화면 전체 모양 꾸미기 */
    body {
      font-family: "맑은 고딕", sans-serif;
      background-color: #f4f6fb;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #222;
    }
    h1 { font-size: 32px; margin-bottom: 20px; }

    /* 이름을 적는 칸 */
    .name-box { width: 100%; max-width: 500px; margin-bottom: 20px; }
    .name-box label { font-size: 18px; font-weight: bold; }
    #nameList {
      width: 100%; height: 120px; font-size: 16px; padding: 10px;
      border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box;
      margin-top: 8px; line-height: 1.6;
    }

    /* 모둠 수 고르는 칸 */
    .setting { margin-bottom: 20px; font-size: 20px; }
    .setting input {
      width: 70px; font-size: 20px; padding: 6px;
      text-align: center; border: 2px solid #cbd5e1; border-radius: 8px;
    }

    /* 가운데 큰 버튼 */
    #drawButton {
      font-size: 28px; font-weight: bold; color: white;
      background-color: #2563eb; border: none; border-radius: 16px;
      padding: 20px 50px; cursor: pointer;
    }
    #drawButton:hover { background-color: #1d4ed8; }

    /* 결과가 보이는 칸 */
    #result {
      margin-top: 30px; width: 100%; max-width: 600px;
    }
    .group-line {
      background-color: white; border: 2px solid #e2e8f0;
      border-radius: 12px; padding: 14px 20px; margin-bottom: 12px;
      font-size: 20px; line-height: 1.5;
    }
    .group-line b { color: #2563eb; }
  </style>
</head>
<body>

  <h1>우리 반 모둠 뽑기</h1>

  <!-- 학생 이름을 적는 칸 (한 줄에 한 명씩) -->
  <div class="name-box">
    <label>학생 이름 (한 줄에 한 명씩 적어요)</label>
    <textarea id="nameList">김하늘
이바다
박소리
최햇살
정구름
한별
오다솜
유나래</textarea>
  </div>

  <!-- 모둠 수를 고르는 칸 -->
  <div class="setting">
    몇 개 모둠으로 나눌까요?
    <input type="number" id="groupCount" value="2" min="1">개
  </div>

  <button id="drawButton" onclick="makeGroups()">모둠 나누기</button>

  <div id="result"></div>

  <script>
    function makeGroups() {
      // 1. 이름 칸에 적힌 내용을 줄 단위로 가져옵니다.
      var text = document.getElementById("nameList").value;
      var names = text.split("\n");

      // 2. 빈 줄이나 앞뒤 공백은 정리해서 실제 이름만 남깁니다.
      var students = [];
      for (var i = 0; i < names.length; i++) {
        var name = names[i].trim();
        if (name !== "") {
          students.push(name);
        }
      }

      // 3. 모둠 수를 가져옵니다.
      var groupCount = Number(document.getElementById("groupCount").value);

      // 이름이 없거나 모둠 수가 잘못되면 알려줍니다.
      if (students.length === 0) {
        alert("학생 이름을 한 명 이상 적어주세요.");
        return;
      }
      if (groupCount < 1) {
        alert("모둠 수는 1개 이상이어야 해요.");
        return;
      }

      // 4. 이름을 무작위로 마구 섞습니다. (피셔-예이츠 방식: 더 골고루 섞임)
      for (var s = students.length - 1; s > 0; s--) {
        var r = Math.floor(Math.random() * (s + 1));
        var temp = students[s];
        students[s] = students[r];
        students[r] = temp;
      }

      // 5. 빈 모둠 상자를 모둠 수만큼 만듭니다.
      var groups = [];
      for (var g = 0; g < groupCount; g++) {
        groups.push([]);
      }

      // 6. 섞은 이름을 1모둠, 2모둠, 3모둠... 순서로 돌아가며 한 명씩 나눠 담습니다.
      //    이렇게 하면 인원이 딱 안 나눠져도 최대 1명 차이로 골고루 나뉩니다.
      for (var j = 0; j < students.length; j++) {
        groups[j % groupCount].push(students[j]);
      }

      // 7. 결과를 '1모둠: 이름, 이름' 형태로 한 줄씩 보여줍니다.
      var result = document.getElementById("result");
      result.innerHTML = "";
      for (var k = 0; k < groups.length; k++) {
        var line = document.createElement("div");
        line.className = "group-line";
        line.innerHTML = "<b>" + (k + 1) + "모둠 (" + groups[k].length + "명):</b> " + groups[k].join(", ");
        result.appendChild(line);
      }
    }
  </script>

</body>
</html>
