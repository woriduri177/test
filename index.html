<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 모둠 뽑기</title>
  <style>
    /* 화면 전체 모양 꾸미기 - 밝고 화사한 배경 */
    body {
      font-family: "맑은 고딕", sans-serif;
      background-color: #fff9e6;
      background-image: radial-gradient(#ffe08a 12%, transparent 13%),
                        radial-gradient(#ffd1e8 12%, transparent 13%);
      background-position: 0 0, 30px 30px;
      background-size: 60px 60px;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    h1 {
      font-size: 44px;
      margin-bottom: 20px;
      color: #ff5b5b;
      text-shadow: 2px 2px 0 #fff;
    }

    /* 이름을 적는 칸 */
    .name-box { width: 100%; max-width: 520px; margin-bottom: 20px; }
    .name-box label { font-size: 20px; font-weight: bold; color: #555; }
    #nameList {
      width: 100%; height: 130px; font-size: 18px; padding: 12px;
      border: 3px solid #ffd166; border-radius: 16px; box-sizing: border-box;
      margin-top: 8px; line-height: 1.6; background-color: #fffdf5;
    }

    /* 모둠 수 고르는 칸 */
    .setting { margin-bottom: 24px; font-size: 24px; font-weight: bold; color: #555; }
    .setting input {
      width: 80px; font-size: 24px; padding: 8px;
      text-align: center; border: 3px solid #ffd166; border-radius: 12px;
    }

    /* 가운데 큰 버튼 */
    #drawButton {
      font-size: 34px; font-weight: bold; color: white;
      background-color: #ff5b5b; border: none; border-radius: 24px;
      padding: 22px 60px; cursor: pointer;
      box-shadow: 0 6px 0 #d63d3d;
      transition: transform 0.1s;
    }
    #drawButton:hover { background-color: #ff4040; }
    #drawButton:active { transform: translateY(4px); box-shadow: 0 2px 0 #d63d3d; }

    /* 결과가 보이는 칸 */
    #result {
      margin-top: 36px; width: 100%; max-width: 900px;
      display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
    }
    .group-card {
      border-radius: 24px; padding: 20px 28px; min-width: 180px;
      color: white; text-align: center;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    }
    .group-card .emoji { font-size: 54px; }
    .group-card h2 { font-size: 26px; margin: 8px 0 12px 0; }
    .group-card p { font-size: 22px; margin: 6px 0; line-height: 1.6; }
  </style>
</head>
<body>

  <h1>🎉 우리 반 모둠 뽑기 🎉</h1>

  <!-- 학생 이름을 적는 칸 (한 줄에 한 명씩) -->
  <div class="name-box">
    <label>학생 이름 (한 줄에 한 명씩 적어요)</label>
    <textarea id="nameList">김하늘
이바다
박소리
최햇살
정구름
한별
오다솜
유나래</textarea>
  </div>

  <!-- 모둠 수를 고르는 칸 -->
  <div class="setting">
    몇 개 모둠으로 나눌까요?
    <input type="number" id="groupCount" value="2" min="1">개
  </div>

  <button id="drawButton" onclick="makeGroups()">모둠 나누기!</button>

  <div id="result"></div>

  <script>
    // 모둠마다 쓸 동물 이모지 + 이름 + 색깔을 미리 정해둡니다.
    var themes = [
      { emoji: "🦁", name: "사자모둠",   color: "#ff8c42" },
      { emoji: "🐯", name: "호랑이모둠", color: "#ffb703" },
      { emoji: "🐻", name: "곰모둠",     color: "#a3743a" },
      { emoji: "🐰", name: "토끼모둠",   color: "#ff6fb5" },
      { emoji: "🐼", name: "판다모둠",   color: "#5a9bd8" },
      { emoji: "🐸", name: "개구리모둠", color: "#4caf50" },
      { emoji: "🐧", name: "펭귄모둠",   color: "#3a86ff" },
      { emoji: "🦊", name: "여우모둠",   color: "#ef6351" },
      { emoji: "🐨", name: "코알라모둠", color: "#7d8597" },
      { emoji: "🐮", name: "젖소모둠",   color: "#8338ec" }
    ];

    function makeGroups() {
      // 1. 이름 칸에 적힌 내용을 줄 단위로 가져옵니다.
      var text = document.getElementById("nameList").value;
      var names = text.split("\n");

      // 2. 빈 줄이나 앞뒤 공백은 정리해서 실제 이름만 남깁니다.
      var students = [];
      for (var i = 0; i < names.length; i++) {
        var name = names[i].trim();
        if (name !== "") {
          students.push(name);
        }
      }

      // 3. 모둠 수를 가져옵니다.
      var groupCount = Number(document.getElementById("groupCount").value);

      // 이름이 없거나 모둠 수가 잘못되면 알려줍니다.
      if (students.length === 0) {
        alert("학생 이름을 한 명 이상 적어주세요.");
        return;
      }
      if (groupCount < 1) {
        alert("모둠 수는 1개 이상이어야 해요.");
        return;
      }

      // 4. 이름을 무작위로 마구 섞습니다. (피셔-예이츠 방식)
      for (var s = students.length - 1; s > 0; s--) {
        var r = Math.floor(Math.random() * (s + 1));
        var temp = students[s];
        students[s] = students[r];
        students[r] = temp;
      }

      // 5. 빈 모둠 상자를 모둠 수만큼 만듭니다.
      var groups = [];
      for (var g = 0; g < groupCount; g++) {
        groups.push([]);
      }

      // 6. 섞은 이름을 1모둠, 2모둠... 순서로 돌아가며 한 명씩 골고루 나눠 담습니다.
      for (var j = 0; j < students.length; j++) {
        groups[j % groupCount].push(students[j]);
      }

      // 7. 결과를 색깔 카드 + 동물 이모지로 예쁘게 보여줍니다.
      var result = document.getElementById("result");
      result.innerHTML = "";
      for (var k = 0; k < groups.length; k++) {
        // 정해둔 테마가 모자라면 다시 처음 것부터 돌려씁니다.
        var theme = themes[k % themes.length];

        var card = document.createElement("div");
        card.className = "group-card";
        card.style.backgroundColor = theme.color;
        card.innerHTML =
          "<div class='emoji'>" + theme.emoji + "</div>" +
          "<h2>" + theme.name + " (" + groups[k].length + "명)</h2>" +
          "<p>" + groups[k].join("<br>") + "</p>";
        result.appendChild(card);
      }
    }
  </script>

</body>
</html>
